<style>
:root {
  --navy:#0a1628;--navy-mid:#0f2044;--navy-light:#1a3260;
  --blue:#1a9fe0;--blue-bright:#2dbfff;--blue-pale:#e8f7ff;
  --white:#ffffff;--gray-1:#f0f6fb;--gray-2:#c8dcea;--gray-3:#7ea8c4;
  --green:#00d68f;--orange:#ff9f43;--red:#ff4757;
  --radius:14px;--radius-sm:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;overflow-x:hidden}

/* ── AUTH OVERLAY ── */
#authOverlay{position:fixed;inset:0;background:var(--navy);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
#authOverlay.hide{display:none}
.auth-card{background:#0f2044;border:1px solid rgba(26,159,224,0.15);border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,0.5)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#1a9fe0,#2dbfff);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 8px 24px rgba(26,159,224,0.35)}
.auth-logo h1{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:2px}
.auth-logo p{font-size:11px;color:#7ea8c4;margin-top:4px;line-height:1.4}
.auth-tabs{display:flex;background:rgba(255,255,255,0.04);border-radius:10px;padding:3px;margin-bottom:24px;gap:3px}
.auth-tab{flex:1;padding:9px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;cursor:pointer;border-radius:8px;transition:all .2s;color:#7ea8c4}
.auth-tab.active{background:#1a9fe0;color:#fff;box-shadow:0 4px 12px rgba(26,159,224,0.3)}
.auth-panel{display:none}.auth-panel.show{display:block}
.auth-form-group{margin-bottom:16px}
.auth-label{display:block;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7ea8c4;margin-bottom:7px}
.auth-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(26,159,224,0.18);border-radius:10px;padding:12px 15px;font-family:'Barlow',sans-serif;font-size:14px;color:#fff;outline:none;transition:border-color .2s}
.auth-input:focus{border-color:#2dbfff;background:rgba(26,159,224,0.06)}
.auth-input::placeholder{color:#7ea8c4}
.btn-auth{width:100%;background:linear-gradient(135deg,#1a9fe0,#2dbfff);color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:1px;cursor:pointer;transition:opacity .2s;margin-top:4px;box-shadow:0 6px 20px rgba(26,159,224,0.3)}
.btn-auth:hover{opacity:.9}.btn-auth:disabled{opacity:.5;cursor:not-allowed}
.auth-alert{padding:10px 13px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:14px;display:none;align-items:center;gap:8px}
.auth-alert.show{display:flex}
.auth-alert.error{background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.25);color:#ff4757}
.auth-alert.success{background:rgba(0,214,143,0.08);border:1px solid rgba(0,214,143,0.25);color:#00d68f}
.auth-forgot{text-align:right;margin-top:-8px;margin-bottom:16px}
.auth-forgot a{font-size:12px;color:#2dbfff;text-decoration:none;cursor:pointer}
.auth-forgot a:hover{text-decoration:underline}
.auth-footer-note{text-align:center;margin-top:20px;font-size:11px;color:#7ea8c4}
.auth-back{display:flex;align-items:center;gap:6px;color:#2dbfff;font-size:13px;cursor:pointer;margin-bottom:18px;font-weight:600}
.auth-back:hover{text-decoration:underline}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:210px;height:100vh;background:rgba(14,28,56,0.82);backdrop-filter:blur(8px);border-right:1px solid rgba(100,180,255,0.1);display:flex;flex-direction:column;z-index:100;overflow-y:auto;overflow-x:hidden}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(26,159,224,0.12);display:flex;align-items:center;gap:10px}
.logo-icon{width:42px;height:42px;flex-shrink:0}
.logo-text span:first-child{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;color:var(--blue-bright);letter-spacing:2px;text-transform:uppercase;display:block}
.logo-text span:last-child{font-size:9px;font-weight:500;color:var(--gray-3);letter-spacing:3px;text-transform:uppercase;margin-top:2px;display:block}

.sidebar-section{
  padding:3px 0;
  margin:4px 5px 0;
  border:1px solid rgba(100,180,255,0.07);
  border-radius:8px;
  background:rgba(100,180,255,0.015);
  overflow:visible;
  flex-shrink:0;
}
.sidebar-section-label{
  font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--gray-3);padding:9px 14px 3px;
  display:block;
}

.nav-year{user-select:none}
.nav-year-header{display:flex;align-items:center;justify-content:space-between;padding:10px 22px;cursor:pointer;transition:background .2s}
.nav-year-header:hover{background:rgba(26,159,224,0.08)}
.nav-year-header.active{background:rgba(26,159,224,0.1)}
.nav-year-label{display:flex;align-items:center;gap:7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.3px}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--gray-3);transition:background .2s;flex-shrink:0}
.nav-year-header.active .nav-dot{background:var(--blue-bright)}
.chevron{width:12px;height:12px;border-right:2px solid var(--gray-3);border-bottom:2px solid var(--gray-3);transform:rotate(45deg) translateY(-3px);transition:transform .25s,border-color .2s;flex-shrink:0}
.nav-year.open .chevron{transform:rotate(-135deg) translateY(-3px)}
.nav-year-header.active .chevron{border-color:var(--blue-bright)}
.tag-semestre{font-size:9px;background:rgba(26,159,224,0.15);border:1px solid rgba(26,159,224,0.25);color:var(--blue-bright);padding:1px 7px;border-radius:10px;font-weight:700;letter-spacing:.5px}

.nav-months{display:none;padding:3px 0 6px 0;flex-direction:column;gap:1px}
.nav-year.open .nav-months{display:flex !important;}

/* MONTH ITEM */
.nav-month-item{display:flex;align-items:center;padding:2px 8px 2px 28px;border-radius:6px;transition:background .15s;gap:5px;position:relative;min-height:36px}
.nav-month-item:hover{background:rgba(26,159,224,0.07)}
.nav-month-item.active{background:rgba(26,159,224,0.14)}

.month-btn{flex:1;background:none;border:none;outline:none;cursor:pointer;text-align:left;padding:8px 4px;font-family:'Barlow',sans-serif;font-size:12.5px;font-weight:500;color:var(--gray-2);transition:color .15s;display:flex;align-items:center;gap:6px;min-height:36px}
.nav-month-item:hover .month-btn{color:var(--white)}
.nav-month-item.active .month-btn{color:var(--blue-bright);font-weight:600}
.nav-month-item.no-data .month-btn{color:var(--gray-3);opacity:.6}

/* Status dot on month */
.month-status{width:7px;height:7px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--gray-3);transition:all .2s}
.nav-month-item.has-data .month-status{background:var(--green);border-color:var(--green);box-shadow:0 0 6px rgba(0,214,143,0.5)}
.nav-month-item.active .month-status{border-color:var(--blue-bright)}

/* Upload btn per month */
.month-upload-btn{width:24px;height:24px;border-radius:6px;border:1px solid rgba(26,159,224,0.2);background:rgba(26,159,224,0.06);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s,opacity .2s;flex-shrink:0;opacity:0.75;position:relative;z-index:2}
.nav-month-item:hover .month-upload-btn{opacity:1 !important}
.nav-month-item.has-data .month-upload-btn{opacity:.8;border-color:rgba(0,214,143,0.3);background:rgba(0,214,143,0.06)}
.nav-month-item.has-data:hover .month-upload-btn{opacity:1}
.month-upload-btn:hover{background:rgba(26,159,224,0.18) !important;border-color:var(--blue-bright) !important;opacity:1 !important}
.month-upload-btn svg{pointer-events:none}
/* Hover para botões de upload em todos os tipos de nav-item */
.nav-sub-item:hover .month-upload-btn{opacity:1 !important}
.nav-sub2-item:hover .month-upload-btn{opacity:1 !important}
.nav-truck-item:hover .month-upload-btn{opacity:1 !important}
.nav-msub-item:hover .month-upload-btn{opacity:1 !important}
.nav-simple-item:hover .month-upload-btn{opacity:1 !important}

/* TOOLTIP */
.month-upload-btn[title]:hover::after{content:attr(title);position:absolute;right:44px;top:50%;transform:translateY(-50%);background:var(--navy);border:1px solid rgba(26,159,224,0.25);color:var(--gray-2);font-size:11px;padding:4px 8px;border-radius:5px;white-space:nowrap;z-index:200;pointer-events:none}

.sidebar-footer{margin-top:auto;padding:18px 22px;border-top:1px solid rgba(26,159,224,0.1)}
.sidebar-footer p{font-size:11px;color:var(--gray-3);line-height:1.5}

/* MAIN */
.main{margin-left:210px;min-height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:rgba(15,32,68,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(26,159,224,0.12);padding:0 36px;height:66px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90}
.topbar-left h1{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;letter-spacing:.5px}
.topbar-left p{font-size:12px;color:var(--gray-3)}
.topbar-right{display:flex;align-items:center;gap:14px}
.period-badge{background:rgba(26,159,224,0.12);border:1px solid rgba(26,159,224,0.25);color:var(--blue-bright);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.upload-btn-top{display:flex;align-items:center;gap:7px;background:var(--blue);color:var(--white);border:none;padding:9px 20px;border-radius:var(--radius-sm);font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;letter-spacing:.3px;cursor:pointer;transition:background .2s,transform .15s}
.upload-btn-top:hover{background:var(--blue-bright);transform:translateY(-1px)}

/* CONTENT */
.content{padding:30px 36px;flex:1}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:62vh;text-align:center;gap:18px}
.empty-icon{width:76px;height:76px;background:rgba(26,159,224,0.07);border:2px dashed rgba(26,159,224,0.28);border-radius:18px;display:flex;align-items:center;justify-content:center;animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{border-color:rgba(26,159,224,0.2)}50%{border-color:rgba(26,159,224,0.55)}}
.empty-state h2{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700}
.empty-state p{font-size:13px;color:var(--gray-3);max-width:420px;line-height:1.65}

.drop-zone{border:2px dashed rgba(26,159,224,0.3);border-radius:var(--radius);padding:36px 56px;margin-top:8px;cursor:pointer;transition:border-color .2s,background .2s;background:rgba(26,159,224,0.02)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--blue-bright);background:rgba(26,159,224,0.07)}
.drop-zone strong{display:block;font-size:14px;color:var(--blue-bright);font-weight:600;margin-bottom:5px}
.drop-zone p{font-size:12px;color:var(--gray-3);margin-top:0}

/* NO DATA STATE */
.no-data-state{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;gap:14px}
.no-data-state.show{display:flex}
.no-data-icon{width:64px;height:64px;background:rgba(255,159,67,0.07);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px}
.no-data-state h3{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700}
.no-data-state p{font-size:13px;color:var(--gray-3);line-height:1.6}
.no-data-upload-btn{margin-top:6px;display:flex;align-items:center;gap:8px;background:rgba(26,159,224,0.1);border:1px solid rgba(26,159,224,0.3);color:var(--blue-bright);padding:11px 24px;border-radius:var(--radius-sm);font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s}
.no-data-upload-btn:hover{background:rgba(26,159,224,0.2)}

/* ALERT */
.alert-banner{display:none;align-items:center;gap:12px;background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.3);border-radius:var(--radius-sm);padding:11px 16px;margin-bottom:20px;font-size:13px;color:var(--red);font-weight:500}
.alert-banner.show{display:flex}
.alert-success{background:rgba(0,214,143,0.08) !important;border-color:rgba(0,214,143,0.3) !important;color:var(--green) !important}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.kpi-card{background:var(--navy-mid);border:1px solid rgba(26,159,224,0.1);border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s}
.kpi-card:hover{transform:translateY(-2px);border-color:rgba(26,159,224,0.28)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.blue::before{background:linear-gradient(90deg,var(--blue),var(--blue-bright))}
.kpi-card.green::before{background:linear-gradient(90deg,#00b877,var(--green))}
.kpi-card.orange::before{background:linear-gradient(90deg,#e87c1e,var(--orange))}
.kpi-card.red::before{background:linear-gradient(90deg,#e03042,var(--red))}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray-3);margin-bottom:10px}
.kpi-value{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--white);line-height:1;margin-bottom:5px}
.kpi-sub{font-size:11px;color:var(--gray-3)}
.kpi-icon{position:absolute;right:18px;top:18px;opacity:.1;font-size:38px}

/* SECTION TITLE */
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray-2);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:rgba(26,159,224,0.12)}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:26px}
.chart-card{background:var(--navy-mid);border:1px solid rgba(26,159,224,0.1);border-radius:var(--radius);padding:20px 22px}
.chart-card-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-2);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.chart-sub{font-size:11px;color:var(--gray-3);font-weight:400;text-transform:none;letter-spacing:0}
.chart-wrap{position:relative;height:210px}

/* TABLE */
.table-card{background:var(--navy-mid);border:1px solid rgba(26,159,224,0.1);border-radius:var(--radius);overflow:hidden;margin-bottom:26px}
.table-header-bar{padding:16px 22px;border-bottom:1px solid rgba(26,159,224,0.09);display:flex;align-items:center;justify-content:space-between}
.table-header-bar h3{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-2)}
.search-box{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.04);border:1px solid rgba(26,159,224,0.14);border-radius:6px;padding:6px 12px}
.search-box input{background:none;border:none;outline:none;color:var(--white);font-family:'Barlow',sans-serif;font-size:12px;width:170px}
.search-box input::placeholder{color:var(--gray-3)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:11px 18px;text-align:left;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray-3);background:rgba(10,22,40,0.4);border-bottom:1px solid rgba(26,159,224,0.07)}
tbody tr{border-bottom:1px solid rgba(26,159,224,0.05);transition:background .15s}
tbody tr:hover{background:rgba(26,159,224,0.05)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:13px 18px;color:var(--white)}
.driver-name{display:flex;align-items:center;gap:11px;font-weight:600}
.driver-avatar{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--navy-light));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;flex-shrink:0}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700}
.pill-blue{background:rgba(26,159,224,0.12);color:var(--blue-bright)}
.pill-green{background:rgba(0,214,143,0.1);color:var(--green)}
.nc-wrap{display:flex;align-items:center;gap:9px}
.nc-track{flex:1;max-width:70px;height:4px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
.nc-fill{height:100%;border-radius:3px}
.num{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700}

/* CONFORMITY ROW */
.conformity-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:26px}
.conf-card{background:var(--navy-mid);border:1px solid rgba(26,159,224,0.1);border-radius:var(--radius);padding:20px 22px}
.conf-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-3);margin-bottom:16px}
.nc-rank-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(26,159,224,0.05)}
.nc-rank-item:last-child{border-bottom:none}
.nc-rank-name{font-size:13px;font-weight:500}
.nc-rank-right{display:flex;align-items:center;gap:9px}

/* HIDDEN INPUT */
#fileInput{display:none}

/* ── UPLOAD BUTTONS EM SUB-ITEMS ── */
.nav-msub-item,
.nav-sub-item,
.nav-sub2-item {
  position: relative;
}
.sub-upload-btn {
  width: 22px; height: 22px;
  border-radius: 5px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  opacity: 0.4;
  transition: opacity .2s, background .2s, border-color .2s;
  margin-left: auto;
  margin-right: 4px;
}
.nav-msub-item:hover .sub-upload-btn,
.nav-sub-item:hover .sub-upload-btn,
.nav-sub2-item:hover .sub-upload-btn,
.nav-month-item:hover .sub-upload-btn,
.nav-truck-item:hover .sub-upload-btn,
.nav-simple-item:hover .sub-upload-btn {
  opacity: 1 !important;
}
.sub-upload-btn:hover,
.sub-upload-btn:focus {
  background: rgba(26,159,224,0.25) !important;
  border-color: rgba(26,159,224,0.6) !important;
  opacity: 1 !important;
}
.nav-msub-item.active-multas .sub-upload-btn,
.nav-msub-item.active-comb .sub-upload-btn,
.nav-sub-item.active .sub-upload-btn,
.nav-sub2-item.active .sub-upload-btn {
  opacity: 0.5;
}
.nav-msub-item:hover .sub-upload-btn:hover,
.nav-sub-item:hover .sub-upload-btn:hover,
.nav-sub2-item:hover .sub-upload-btn:hover {
  opacity: 1 !important;
  background: rgba(26,159,224,0.2) !important;
  border-color: var(--blue-bright) !important;
}
/* Motoristas folder upload */
.mot-folder-upload-btn {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 1px solid rgba(255,159,67,0.25);
  background: rgba(255,159,67,0.07);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity .2s, background .2s;
  margin-left: 6px;
}
.nav-month-item:hover .mot-folder-upload-btn { opacity: 1; }
.mot-folder-upload-btn:hover { background: rgba(255,159,67,0.22) !important; border-color: var(--orange) !important; }
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:rgba(15,32,68,0.6)}
::-webkit-scrollbar-thumb{background:rgba(26,159,224,0.22);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(26,159,224,0.42)}

@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.charts-row,.conformity-row{grid-template-columns:1fr}}

/* ══════════════════════════════════════
   SIGCORJ SECTION
══════════════════════════════════════ */
.sigcorj-page { display:flex; flex-direction:column; gap:0; animation:fadeUp .5s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* HERO */
.sigcorj-hero {
  position:relative; overflow:hidden;
  background: linear-gradient(135deg, #0d1e3a 0%, #0f2044 50%, #0a1628 100%);
  border:1px solid rgba(26,159,224,0.15); border-radius:var(--radius);
  padding:52px 56px 48px; margin-bottom:20px;
}
.sigcorj-hero::before {
  content:''; position:absolute; top:-60px; right:-60px;
  width:340px; height:340px; border-radius:50%;
  background:radial-gradient(circle, rgba(26,159,224,0.12) 0%, transparent 70%);
  pointer-events:none;
}
.sigcorj-hero::after {
  content:''; position:absolute; bottom:-80px; left:30%;
  width:260px; height:260px; border-radius:50%;
  background:radial-gradient(circle, rgba(45,191,255,0.07) 0%, transparent 70%);
  pointer-events:none;
}
.sigcorj-eyebrow {
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(26,159,224,0.1); border:1px solid rgba(26,159,224,0.22);
  border-radius:20px; padding:5px 14px; margin-bottom:20px;
  font-size:10px; font-weight:700; letter-spacing:2.5px;
  text-transform:uppercase; color:var(--blue-bright);
}
.sigcorj-eyebrow-dot { width:6px; height:6px; border-radius:50%; background:var(--blue-bright); animation:blink 2s ease-in-out infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sigcorj-hero h1 {
  font-family:'Barlow Condensed',sans-serif; font-size:42px; font-weight:800;
  line-height:1.08; letter-spacing:.5px; margin-bottom:8px;
  background:linear-gradient(135deg,#fff 30%,var(--blue-bright));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.sigcorj-hero h1 em { font-style:normal; -webkit-text-fill-color:var(--blue-bright); }
.sigcorj-hero-sub {
  font-size:14px; color:var(--gray-2); line-height:1.7;
  max-width:680px; margin-bottom:28px; font-weight:400;
}
.sigcorj-hero-sub strong { color:var(--white); font-weight:600; }
.sigcorj-hero-desc {
  font-size:13px; color:var(--gray-3); line-height:1.75;
  max-width:700px; border-left:2px solid rgba(26,159,224,0.3);
  padding-left:18px; margin-bottom:32px;
}

/* VISION BANNER */
.sigcorj-vision {
  background:linear-gradient(90deg,rgba(26,159,224,0.1),rgba(45,191,255,0.05),rgba(26,159,224,0.1));
  border:1px solid rgba(26,159,224,0.2); border-radius:10px;
  padding:22px 28px; display:flex; align-items:center; gap:32px; flex-wrap:wrap;
}
.vision-step { display:flex; align-items:center; gap:10px; }
.vision-step-icon { font-size:18px; flex-shrink:0; }
.vision-step-text { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:.5px; color:var(--white); line-height:1.2; }
.vision-step-text span { display:block; font-size:10px; font-weight:500; color:var(--gray-3); letter-spacing:1px; text-transform:uppercase; margin-top:1px; }
.vision-arrow { color:rgba(26,159,224,0.4); font-size:18px; font-weight:300; }

/* GRID 2 COLS */
.sigcorj-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
.sigcorj-grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }

/* CARD BASE */
.sig-card {
  background:var(--navy-mid); border:1px solid rgba(26,159,224,0.1);
  border-radius:var(--radius); padding:24px 22px; position:relative; overflow:hidden;
  transition:transform .2s,border-color .2s;
}
.sig-card:hover { transform:translateY(-2px); border-color:rgba(26,159,224,0.25); }
.sig-card-accent { position:absolute; top:0; left:0; right:0; height:3px; border-radius:var(--radius) var(--radius) 0 0; }
.sig-card-icon { font-size:28px; margin-bottom:12px; display:block; }
.sig-card-title {
  font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700;
  letter-spacing:.5px; color:var(--white); margin-bottom:8px;
}
.sig-card-text { font-size:12.5px; color:var(--gray-3); line-height:1.7; }

/* HOW IT WORKS */
.sigcorj-how {
  background:var(--navy-mid); border:1px solid rgba(26,159,224,0.1);
  border-radius:var(--radius); padding:28px 28px; margin-bottom:20px;
}
.sigcorj-how-header {
  display:flex; align-items:center; gap:14px; margin-bottom:24px;
  padding-bottom:18px; border-bottom:1px solid rgba(26,159,224,0.1);
}
.sigcorj-how-icon {
  width:44px;height:44px; border-radius:12px;
  background:rgba(26,159,224,0.1); border:1px solid rgba(26,159,224,0.2);
  display:flex; align-items:center; justify-content:center; font-size:20px;
  flex-shrink:0;
}
.sigcorj-how-header h3 { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; letter-spacing:.5px; }
.sigcorj-how-header p { font-size:12px; color:var(--gray-3); margin-top:2px; }
.pillar-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.pillar-item {
  display:flex; align-items:flex-start; gap:10px;
  background:rgba(26,159,224,0.04); border:1px solid rgba(26,159,224,0.08);
  border-radius:var(--radius-sm); padding:13px 14px;
  transition:background .2s;
}
.pillar-item:hover { background:rgba(26,159,224,0.09); }
.pillar-num {
  font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800;
  color:rgba(26,159,224,0.25); line-height:1; flex-shrink:0; margin-top:1px;
}
.pillar-text { font-size:12px; color:var(--gray-2); line-height:1.55; font-weight:500; }

/* BENEFITS */
.benefits-card {
  background:var(--navy-mid); border:1px solid rgba(26,159,224,0.1);
  border-radius:var(--radius); padding:28px 28px; margin-bottom:20px;
}
.benefits-header { margin-bottom:22px; }
.benefits-header h3 { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; letter-spacing:.5px; margin-bottom:4px; }
.benefits-header p { font-size:12px; color:var(--gray-3); }
.benefits-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.benefit-item {
  display:flex; align-items:center; gap:10px;
  background:rgba(0,214,143,0.04); border:1px solid rgba(0,214,143,0.1);
  border-radius:var(--radius-sm); padding:11px 14px;
  transition:background .2s;
}
.benefit-item:hover { background:rgba(0,214,143,0.08); }
.benefit-check {
  width:20px; height:20px; border-radius:6px;
  background:rgba(0,214,143,0.12); border:1px solid rgba(0,214,143,0.25);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.benefit-check svg { display:block; }
.benefit-text { font-size:12.5px; color:var(--gray-2); font-weight:500; line-height:1.3; }

/* VISION FULL */
.vision-full {
  background:linear-gradient(135deg,#0d1e3a,#0f2044);
  border:1px solid rgba(26,159,224,0.18); border-radius:var(--radius);
  padding:36px 40px; text-align:center; margin-bottom:28px; position:relative; overflow:hidden;
}
.vision-full::before {
  content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:400px; height:200px;
  background:radial-gradient(ellipse,rgba(26,159,224,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.vision-full-label { font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--gray-3); margin-bottom:20px; }
.vision-chain { display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap; }
.vision-node {
  background:rgba(26,159,224,0.08); border:1px solid rgba(26,159,224,0.2);
  border-radius:10px; padding:14px 20px; text-align:center;
}
.vision-node-top { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800; color:var(--white); line-height:1; }
.vision-node-top em { font-style:normal; color:var(--blue-bright); }
.vision-node-bot { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--gray-3); margin-top:4px; }
.vision-sep { font-size:22px; color:rgba(26,159,224,0.35); font-weight:300; }

/* upload drop below hero */
.sigcorj-start {
  display:flex; align-items:center; gap:14px;
  background:rgba(26,159,224,0.06); border:1px dashed rgba(26,159,224,0.25);
  border-radius:10px; padding:18px 22px; cursor:pointer;
  transition:border-color .2s,background .2s; margin-top:0;
}
.sigcorj-start:hover { border-color:var(--blue-bright); background:rgba(26,159,224,0.1); }
.sigcorj-start-icon { width:40px;height:40px;border-radius:10px;background:rgba(26,159,224,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.sigcorj-start-text strong { display:block; font-size:13px; font-weight:700; color:var(--blue-bright); margin-bottom:2px; }
.sigcorj-start-text span { font-size:11px; color:var(--gray-3); }

/* ── SIGCORJ PANEL ── */
.sigcorj-btn {
  display:flex; align-items:center; gap:9px;
  margin:10px 14px 0;
  padding:10px 14px;
  background:linear-gradient(135deg,rgba(26,159,224,0.12),rgba(26,159,224,0.05));
  border:1px solid rgba(26,159,224,0.25);
  border-radius:10px; cursor:pointer;
  transition:background .2s,border-color .2s;
  text-align:left; width:calc(100% - 28px);
}
.sigcorj-btn:hover{background:linear-gradient(135deg,rgba(26,159,224,0.22),rgba(26,159,224,0.1));border-color:rgba(45,191,255,0.45)}
.sigcorj-btn.active{background:linear-gradient(135deg,rgba(26,159,224,0.28),rgba(26,159,224,0.14));border-color:var(--blue-bright)}
.sigcorj-btn-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--blue),var(--navy-light));border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sigcorj-btn-text span:first-child{display:block;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:1.5px;color:var(--blue-bright);text-transform:uppercase}
.sigcorj-btn-text span:last-child{display:block;font-size:9px;color:var(--gray-3);letter-spacing:.5px;margin-top:1px}

/* SIGCORJ PAGE */
.sigcorj-page{display:none;padding:0 0 40px}
.sigcorj-page.show{display:block}

.sigcorj-hero{
  background:linear-gradient(135deg,var(--navy-mid) 0%,#0d1e3d 60%,rgba(26,159,224,0.06) 100%);
  border:1px solid rgba(26,159,224,0.15);
  border-radius:var(--radius); padding:44px 48px; margin-bottom:28px;
  position:relative; overflow:hidden;
}
.sigcorj-hero::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:280px;height:280px;
  background:radial-gradient(circle,rgba(26,159,224,0.1) 0%,transparent 70%);
  pointer-events:none;
}
.sigcorj-hero::after{
  content:'SIGCORJ';position:absolute;right:40px;bottom:-10px;
  font-family:'Barlow Condensed',sans-serif;font-size:110px;font-weight:900;
  color:rgba(26,159,224,0.04);letter-spacing:-2px;pointer-events:none;line-height:1;
}
.sigcorj-hero-tag{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(26,159,224,0.12);border:1px solid rgba(26,159,224,0.28);
  color:var(--blue-bright);padding:5px 14px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  margin-bottom:18px;
}
.sigcorj-hero h2{
  font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;
  letter-spacing:.5px;line-height:1.15;margin-bottom:10px;
  background:linear-gradient(90deg,var(--white),var(--blue-bright));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sigcorj-hero h2 span{-webkit-text-fill-color:var(--blue-bright)}
.sigcorj-hero p{font-size:14px;color:var(--gray-2);line-height:1.75;max-width:640px;font-weight:400}

/* HOW IT WORKS */
.sigcorj-grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:28px}
.sigcorj-grid3{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}

.info-card{background:var(--navy-mid);border:1px solid rgba(26,159,224,0.1);border-radius:var(--radius);padding:24px 26px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s}
.info-card:hover{border-color:rgba(26,159,224,0.28);transform:translateY(-2px)}
.info-card-accent{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:3px 0 0 3px}
.info-card h4{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:.5px;margin-bottom:10px;color:var(--white)}
.info-card p{font-size:13px;color:var(--gray-2);line-height:1.65}

/* HOW WORKS PILLARS */
.pillar-list{display:flex;flex-direction:column;gap:10px}
.pillar-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(26,159,224,0.04);border:1px solid rgba(26,159,224,0.1);border-radius:9px;font-size:13px;color:var(--gray-2);transition:background .2s,border-color .2s}
.pillar-item:hover{background:rgba(26,159,224,0.09);border-color:rgba(26,159,224,0.22);color:var(--white)}
.pillar-dot{width:8px;height:8px;border-radius:50%;background:var(--blue-bright);flex-shrink:0;box-shadow:0 0 8px rgba(45,191,255,0.5)}

/* OBJECTIVES */
.obj-card{background:var(--navy-mid);border:1px solid rgba(26,159,224,0.1);border-radius:var(--radius);padding:22px 22px 20px;transition:border-color .2s,transform .2s;position:relative;overflow:hidden}
.obj-card:hover{border-color:rgba(26,159,224,0.28);transform:translateY(-3px)}
.obj-icon{font-size:28px;margin-bottom:12px;display:block}
.obj-card h4{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:.5px;margin-bottom:8px;color:var(--white)}
.obj-card p{font-size:12px;color:var(--gray-3);line-height:1.6}
.obj-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.obj-card.c1::before{background:linear-gradient(90deg,var(--blue),var(--blue-bright))}
.obj-card.c2::before{background:linear-gradient(90deg,#00b877,var(--green))}
.obj-card.c3::before{background:linear-gradient(90deg,#e87c1e,var(--orange))}
.obj-card.c4::before{background:linear-gradient(90deg,#a855f7,#7c3aed)}

/* BENEFITS */
.benefits-card{background:var(--navy-mid);border:1px solid rgba(26,159,224,0.1);border-radius:var(--radius);padding:26px 28px;margin-bottom:28px}
.benefits-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:18px}
.benefit-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:rgba(26,159,224,0.04);border:1px solid rgba(26,159,224,0.09);border-radius:9px;font-size:12px;color:var(--gray-2);line-height:1.5;transition:background .2s}
.benefit-item:hover{background:rgba(26,159,224,0.1);color:var(--white)}
.benefit-check{color:var(--green);font-size:14px;flex-shrink:0;margin-top:1px}

/* VISION */
.vision-card{
  background:linear-gradient(135deg,var(--navy-mid),rgba(26,159,224,0.06));
  border:1px solid rgba(26,159,224,0.18);border-radius:var(--radius);
  padding:36px 40px;text-align:center;
}
.vision-steps{display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;margin-top:24px}
.vision-step{text-align:center;padding:16px 24px}
.vision-step-word{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:.5px;color:var(--white);display:block}
.vision-step-sub{font-size:11px;color:var(--gray-3);display:block;margin-top:3px;letter-spacing:.5px}
.vision-arrow{color:var(--blue-bright);font-size:20px;opacity:.6;align-self:center}
.vision-step:nth-child(1) .vision-step-word{color:var(--gray-2)}
.vision-step:nth-child(3) .vision-step-word{color:var(--blue-bright)}
.vision-step:nth-child(5) .vision-step-word{color:var(--green)}
.vision-step:nth-child(7) .vision-step-word{background:linear-gradient(90deg,var(--orange),#ffcf7a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.vision-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray-3);margin-bottom:4px}
.vision-headline{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--white)}

@media(max-width:1100px){
  .sigcorj-grid3{grid-template-columns:repeat(2,1fr)}
  .benefits-grid{grid-template-columns:repeat(2,1fr)}
  .sigcorj-grid2{grid-template-columns:1fr}
}

.hero-red    { background:linear-gradient(135deg,var(--navy-mid),rgba(239,68,68,0.05));   border:1px solid rgba(239,68,68,0.18); }

/* ══ COMPARATIVO DUAL ══ */

#compDropB:hover { border-color:var(--green) !important; background:rgba(0,214,143,0.05) !important; }

#compDropB.loaded { border-color:rgba(0,214,143,0.5);  border-style:solid; }

.delta-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:10px; padding:14px 16px; text-align:center; }

.comp-kpi-half.side-b h4 { color:var(--green); }

@keyframes iconGlow {

  50%      { box-shadow: 0 0 26px rgba(26,159,224,0.22), inset 0 1px 0 rgba(255,255,255,0.12); }
}

/* ── PDF EXPORT ── */
.pdf-export-btn {
  display:flex; align-items:center; gap:8px;

@media print {

    <div class="auth-footer-note">Encaixe Transportes © 2026</div>
